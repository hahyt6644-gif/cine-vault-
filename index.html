<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Movie Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { 
        extend: { 
          colors: { dark: '#050505', darker: '#000000', primary: '#e50914', accent: '#0088cc' }, 
          animation: { 'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite' } 
        } 
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    [x-cloak] { display: none !important; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .glass-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>

<body class="bg-darker text-white font-sans pb-20 overflow-x-hidden min-h-screen selection:bg-primary selection:text-white" x-data="cineHub()" x-init="fetchData()">

  <!-- IMMERSIVE CINEMATIC LIGHTING -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-[20%] -left-[10%] w-[60vw] h-[60vw] bg-primary/10 blur-[120px] rounded-full animate-pulse-slow"></div>
    <div class="absolute top-[40%] -right-[10%] w-[50vw] h-[50vw] bg-accent/10 blur-[120px] rounded-full animate-pulse-slow" style="animation-delay: 2s;"></div>
  </div>

  <div class="relative z-10 max-w-lg mx-auto px-5 pt-12" x-cloak>
    
    <!-- PREMIUM HERO SECTION -->
    <header class="text-center mb-14 flex flex-col items-center">
      <div class="relative group mb-6">
        <div class="absolute -inset-2 bg-gradient-to-r from-primary to-accent rounded-full blur-md opacity-40 group-hover:opacity-80 transition duration-700"></div>
        <img src="https://ui-avatars.com/api/?name=Cine+Hub&background=e50914&color=fff&size=128" alt="Brand Logo" class="relative w-32 h-32 rounded-full border border-white/20 object-cover shadow-2xl">
      </div>
      
      <h1 class="text-5xl font-black mb-3 tracking-tighter bg-clip-text text-transparent bg-gradient-to-br from-white via-gray-100 to-gray-500">CineHub</h1>
      <p class="text-gray-400 text-sm mb-8 font-medium tracking-wide">Premium Entertainment Hub.</p>
      
      <!-- MAIN CHANNEL CTA -->
      <a :href="config.telegramLink" target="_blank" class="w-full flex items-center justify-center bg-white text-black py-4 rounded-2xl font-black text-lg transition-all hover:scale-[1.02] shadow-[0_0_40px_rgba(255,255,255,0.15)] hover:shadow-[0_0_50px_rgba(255,255,255,0.3)]">
        <i class="ph-fill ph-telegram-logo text-3xl mr-3 text-accent"></i> Join Telegram Channel
      </a>
    </header>

    <!-- LOADING STATE -->
    <div x-show="isLoading" class="flex flex-col items-center justify-center py-20 text-primary">
      <i class="ph ph-circle-notch animate-spin text-5xl mb-4"></i>
      <p class="text-sm text-gray-500 font-bold uppercase tracking-widest">Loading Database</p>
    </div>

    <!-- MODERN MOVIE GRID -->
    <div x-show="!isLoading" class="grid grid-cols-2 gap-5 mb-12">
      <template x-for="movie in movies" :key="movie.id">
        <div @click="selectedMovie = movie" class="group relative rounded-3xl overflow-hidden cursor-pointer aspect-[2/3] bg-dark border border-white/5 shadow-2xl hover:border-white/20 transition-all duration-500">
          
          <img :src="movie.poster" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
          
          <!-- Cinematic Overlay -->
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent opacity-90 group-hover:opacity-100 transition-opacity"></div>
          
          <!-- Animated Play Button Overlay -->
          <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 transform scale-75 group-hover:scale-100">
            <div class="bg-primary/90 backdrop-blur-md p-4 rounded-full shadow-[0_0_40px_rgba(229,9,20,0.6)]">
              <i class="ph-fill ph-play text-white text-2xl ml-1"></i>
            </div>
          </div>
          
          <!-- Badge -->
          <template x-if="movie.badge">
            <span class="absolute top-4 right-4 bg-white/10 backdrop-blur-md border border-white/20 text-white text-[9px] font-black px-3 py-1.5 rounded-lg shadow-lg uppercase tracking-widest" x-text="movie.badge"></span>
          </template>

          <!-- Text Details -->
          <div class="absolute bottom-0 left-0 w-full p-5 transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300">
            <p class="text-primary text-[10px] font-black uppercase tracking-widest mb-1 drop-shadow-md" x-text="movie.genre"></p>
            <h3 class="text-white font-bold text-lg leading-tight truncate drop-shadow-lg" x-text="movie.title"></h3>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ULTRA PREMIUM MOVIE MODAL -->
  <div x-cloak x-show="selectedMovie" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/90 backdrop-blur-2xl p-4 sm:p-0 transition-all">
    <div @click.away="selectedMovie = null" class="w-full max-w-md bg-darker/95 border border-white/10 rounded-[2.5rem] overflow-hidden relative shadow-2xl"
         x-show="selectedMovie" x-transition:enter="transition ease-out duration-400" x-transition:enter-start="opacity-0 translate-y-16 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100">
      
      <!-- Close Button -->
      <button @click="selectedMovie = null" class="absolute top-5 right-5 z-20 glass-btn p-2.5 rounded-full text-white hover:bg-white hover:text-black transition-colors">
        <i class="ph ph-x font-bold text-lg"></i>
      </button>

      <!-- Modal Image -->
      <div class="relative h-80">
        <img :src="selectedMovie?.poster" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-darker via-darker/60 to-transparent"></div>
      </div>

      <!-- Modal Content -->
      <div class="p-8 relative -mt-24">
        <div class="flex space-x-2 mb-4">
          <span class="glass-card px-4 py-1.5 rounded-xl text-[10px] font-black text-white uppercase tracking-widest border border-white/20 shadow-lg" x-text="selectedMovie?.genre"></span>
        </div>
        
        <h2 class="text-4xl font-black mb-8 tracking-tight leading-none" x-text="selectedMovie?.title"></h2>
        
        <div class="space-y-4">
          <!-- SMART REDIRECT BUTTON -->
          <button @click="smartRedirect(selectedMovie)" class="flex items-center justify-center w-full bg-primary text-white py-4 rounded-2xl font-black text-lg hover:bg-red-700 transition shadow-[0_0_30px_rgba(229,9,20,0.4)] hover:scale-[1.02]">
            <i class="ph-fill ph-play-circle text-3xl mr-2"></i> Watch Now
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('cineHub', () => ({
        isLoading: true,
        config: { telegramLink: '' },
        movies: [],
        selectedMovie: null,

        async fetchData() {
          try {
            const response = await fetch('/api/data');
            const data = await response.json();
            this.config = data.config || { telegramLink: '' };
            this.movies = data.movies || [];
          } catch (error) {
            console.error("API Error:", error);
          } finally {
            this.isLoading = false;
          }
        },

        // SMART REDIRECT LOGIC
        smartRedirect(movie) {
          const telegramUrl = this.config.telegramLink;
          const fallbackUrl = movie.watchLink || telegramUrl;

          if (!telegramUrl) {
            window.open(fallbackUrl, '_blank');
            return;
          }

          // 1. Convert standard t.me link to an app deep link (tg://)
          let deepLink = telegramUrl;
          if (telegramUrl.includes('t.me/')) {
            const path = telegramUrl.split('t.me/')[1];
            // Handle private invite links vs public channel links
            if (path.startsWith('+') || path.startsWith('joinchat/')) {
              const inviteCode = path.replace('+', '').replace('joinchat/', '');
              deepLink = `tg://join?invite=${inviteCode}`;
            } else {
              deepLink = `tg://resolve?domain=${path}`;
            }
          }

          // 2. The Fallback Mechanism
          const start = Date.now();
          
          // Create an invisible iframe to try opening the deep link silently
          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = deepLink;
          document.body.appendChild(iframe);

          // If the app doesn't take over the screen in 1.5 seconds, redirect to the Watch Link
          setTimeout(() => {
            document.body.removeChild(iframe);
            // If the browser hasn't paused/backgrounded, the user doesn't have Telegram installed
            if (Date.now() - start < 2000) {
              window.location.href = fallbackUrl;
            }
          }, 1500);
        }
      }))
    })
  </script>
</body>
</html>
