<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Hub</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0a',
            darker: '#050505',
            primary: '#e50914', // Cinematic Red
          }
        }
      }
    }
  </script>
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    [x-cloak] { display: none !important; }
  </style>
</head>

<body class="bg-darker text-white font-sans pb-20 selection:bg-primary selection:text-white" 
      x-data="cineHub()" x-init="initData()">

  <div class="fixed inset-0 z-0 pointer-events-none">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-96 bg-primary/20 blur-[120px] rounded-full"></div>
  </div>

  <div class="relative z-10 max-w-md mx-auto px-4 pt-10" x-cloak x-show="!isLoading">
    
    <header class="text-center mb-10">
      <img :src="config.logoUrl" alt="Logo" class="w-24 h-24 mx-auto rounded-full border-2 border-white/10 shadow-[0_0_30px_rgba(229,9,20,0.3)] mb-6">
      <h1 class="text-3xl font-bold mb-3 tracking-tight" x-text="config.heroTitle"></h1>
      <p class="text-gray-400 text-sm mb-8 px-2" x-text="config.heroSubtitle"></p>
      
      <a :href="config.mainTelegramLink" target="_blank" class="flex items-center justify-center w-full bg-primary hover:bg-red-700 transition-colors text-white py-4 rounded-xl font-semibold text-lg shadow-[0_0_20px_rgba(229,9,20,0.4)]">
        <i class="ph ph-telegram-logo text-2xl mr-2"></i> Join Telegram Channel
      </a>
    </header>

    <div class="mb-8 space-y-4">
      <div class="relative">
        <i class="ph ph-magnifying-glass absolute left-4 top-3.5 text-xl text-gray-500"></i>
        <input type="text" x-model="searchQuery" placeholder="Search movies..." class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 transition-colors">
      </div>
      
      <div class="flex overflow-x-auto pb-2 hide-scrollbar space-x-2">
        <template x-for="cat in categories" :key="cat">
          <button @click="activeCategory = cat" 
                  :class="activeCategory === cat ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'" 
                  class="whitespace-nowrap px-5 py-2 rounded-full text-sm font-medium transition-all" x-text="cat">
          </button>
        </template>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
      <template x-for="movie in filteredMovies" :key="movie.id">
        <div @click="selectedMovie = movie" class="group relative rounded-xl overflow-hidden cursor-pointer aspect-[2/3] bg-dark border border-white/5 shadow-lg">
          <img :src="movie.poster" :alt="movie.title" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
          
          <template x-if="movie.badge">
            <span class="absolute top-2 left-2 bg-primary text-white text-[10px] font-bold px-2 py-1 rounded shadow-md uppercase tracking-wider" x-text="movie.badge"></span>
          </template>

          <div class="absolute bottom-0 left-0 w-full p-3 transform translate-y-2 group-hover:translate-y-0 transition-transform">
            <h3 class="text-white font-bold text-sm truncate" x-text="movie.title"></h3>
            <p class="text-gray-300 text-[11px] mb-2" x-text="movie.language + ' • ' + movie.quality"></p>
            <div class="flex items-center text-primary text-xs font-semibold">
              <i class="ph-fill ph-play-circle text-sm mr-1"></i> Watch Now
            </div>
          </div>
        </div>
      </template>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-10">
      <h3 class="text-lg font-bold mb-4 flex items-center"><i class="ph-fill ph-lightning text-yellow-400 text-xl mr-2"></i> Why Join Our Hub?</h3>
      <ul class="space-y-3">
        <li class="flex items-start text-sm text-gray-300"><i class="ph-fill ph-star text-primary mt-0.5 mr-3"></i> Daily trending movie drops</li>
        <li class="flex items-start text-sm text-gray-300"><i class="ph-fill ph-film-strip text-primary mt-0.5 mr-3"></i> Direct watch links, zero ads</li>
        <li class="flex items-start text-sm text-gray-300"><i class="ph-fill ph-crown text-primary mt-0.5 mr-3"></i> Exclusive channel content</li>
      </ul>
    </div>

    <div class="text-center bg-gradient-to-br from-gray-900 to-black border border-white/10 p-8 rounded-3xl">
      <h2 class="text-2xl font-bold mb-2">Want Full Access?</h2>
      <p class="text-gray-400 text-sm mb-6">Join thousands of members today.</p>
      <a :href="config.mainTelegramLink" target="_blank" class="inline-flex items-center justify-center bg-white text-black py-3 px-8 rounded-full font-bold hover:scale-105 transition-transform">
        Enter Movie Hub <i class="ph-bold ph-caret-right ml-1"></i>
      </a>
    </div>

  </div>

  <div x-cloak x-show="selectedMovie" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm p-4 sm:p-0">
    <div @click.away="selectedMovie = null" class="w-full max-w-md bg-dark border border-white/10 rounded-3xl overflow-hidden relative transition-all"
         x-show="selectedMovie" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-8" x-transition:enter-end="opacity-100 translate-y-0">
      
      <button @click="selectedMovie = null" class="absolute top-4 right-4 z-20 bg-black/50 p-2 rounded-full text-white hover:bg-black">
        <i class="ph ph-x"></i>
      </button>

      <div class="relative h-64">
        <img :src="selectedMovie?.poster" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
      </div>

      <div class="p-6 relative -mt-10">
        <div class="flex items-center space-x-2 mb-2">
          <span class="bg-white/10 px-2 py-1 rounded text-xs font-medium text-gray-300" x-text="selectedMovie?.year"></span>
          <span class="bg-white/10 px-2 py-1 rounded text-xs font-medium text-gray-300" x-text="selectedMovie?.genre"></span>
          <span class="bg-primary/20 text-primary px-2 py-1 rounded text-xs font-bold" x-text="selectedMovie?.quality"></span>
        </div>
        
        <h2 class="text-2xl font-bold mb-1" x-text="selectedMovie?.title"></h2>
        <p class="text-primary text-sm font-medium mb-4" x-text="selectedMovie?.subtitle"></p>
        <p class="text-gray-400 text-sm mb-6 leading-relaxed" x-text="selectedMovie?.description"></p>

        <div class="space-y-3">
          <a :href="selectedMovie?.watchLink || config.mainTelegramLink" target="_blank" class="flex items-center justify-center w-full bg-primary text-white py-3.5 rounded-xl font-bold hover:bg-red-700 transition">
            <i class="ph-fill ph-play-circle text-xl mr-2"></i> Watch Now
          </a>
          <a :href="config.mainTelegramLink" target="_blank" class="flex items-center justify-center w-full bg-white/5 border border-white/10 text-white py-3.5 rounded-xl font-semibold hover:bg-white/10 transition">
            <i class="ph ph-telegram-logo text-xl mr-2"></i> Join Channel
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('cineHub', () => ({
        isLoading: true,
        config: {},
        movies: [],
        categories: ['All'],
        activeCategory: 'All',
        searchQuery: '',
        selectedMovie: null,

        async initData() {
          try {
            const response = await fetch('./data.json');
            const data = await response.json();
            this.config = data.config;
            this.movies = data.movies;
            
            // Extract unique genres for the filter tabs
            const genres = [...new Set(this.movies.map(m => m.genre))];
            this.categories = ['All', ...genres];
            
            this.isLoading = false;
          } catch (error) {
            console.error("Error loading JSON data:", error);
          }
        },

        get filteredMovies() {
          return this.movies.filter(m => {
            const matchesCategory = this.activeCategory === 'All' || m.genre === this.activeCategory;
            const matchesSearch = m.title.toLowerCase().includes(this.searchQuery.toLowerCase());
            return matchesCategory && matchesSearch;
          });
        }
      }))
    })
  </script>
</body>
</html>
