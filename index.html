<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Movie Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { dark: '#030303', primary: '#e50914' }, animation: { 'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite' } } }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    [x-cloak] { display: none !important; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
  </style>
</head>

<body class="bg-dark text-white font-sans pb-20 overflow-x-hidden min-h-screen" x-data="cineHub()" x-init="fetchData()">

  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary/20 blur-[150px] rounded-full animate-pulse-slow"></div>
    <div class="absolute top-1/2 -right-20 w-80 h-80 bg-blue-900/20 blur-[120px] rounded-full animate-pulse-slow" style="animation-delay: 2s;"></div>
  </div>

  <div class="relative z-10 max-w-md mx-auto px-4 pt-12" x-cloak>
    
    <header class="text-center mb-10 flex flex-col items-center">
      <img src="https://ui-avatars.com/api/?name=Cine+Hub&background=e50914&color=fff&size=128" alt="Logo" class="w-28 h-28 rounded-full border border-white/20 mb-6 object-cover shadow-[0_0_30px_rgba(229,9,20,0.3)]">
      <h1 class="text-4xl font-extrabold mb-3 tracking-tighter">Cinematic Hub</h1>
      <p class="text-gray-400 text-sm mb-8 px-4">The ultimate collection of trending movies.</p>
      
      <a :href="config.telegramLink" target="_blank" class="glass-card hover:bg-white/10 w-full flex items-center justify-center py-4 rounded-2xl font-bold text-lg transition-all hover:scale-[1.02]">
        <i class="ph-fill ph-telegram-logo text-2xl mr-3 text-blue-400"></i> Join Telegram
      </a>
    </header>

    <div x-show="isLoading" class="flex justify-center py-20">
      <i class="ph ph-spinner-gap animate-spin text-4xl text-primary"></i>
    </div>

    <div x-show="!isLoading" class="grid grid-cols-2 gap-5 mb-12">
      <template x-for="movie in movies" :key="movie.id">
        <div @click="selectedMovie = movie" class="group relative rounded-2xl overflow-hidden cursor-pointer aspect-[2/3] glass-card shadow-2xl">
          <img :src="movie.poster" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent opacity-90"></div>
          
          <template x-if="movie.badge">
            <span class="absolute top-3 left-3 bg-primary/90 backdrop-blur-md text-white text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-widest" x-text="movie.badge"></span>
          </template>

          <div class="absolute bottom-0 left-0 w-full p-4 transform translate-y-3 group-hover:translate-y-0 transition-transform duration-300">
            <h3 class="text-white font-bold text-sm truncate mb-1" x-text="movie.title"></h3>
            <p class="text-gray-400 text-[10px] uppercase tracking-wider mb-3" x-text="movie.genre"></p>
          </div>
        </div>
      </template>
    </div>
  </div>

  <div x-cloak x-show="selectedMovie" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/90 backdrop-blur-xl p-4 sm:p-0">
    <div @click.away="selectedMovie = null" class="w-full max-w-md bg-dark border border-white/10 rounded-[2rem] overflow-hidden relative shadow-2xl"
         x-show="selectedMovie" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-12 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100">
      
      <button @click="selectedMovie = null" class="absolute top-5 right-5 z-20 bg-black/40 backdrop-blur-md p-2 rounded-full text-white hover:bg-white hover:text-black">
        <i class="ph ph-x font-bold"></i>
      </button>

      <div class="relative h-72">
        <img :src="selectedMovie?.poster" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-dark via-dark/40 to-transparent"></div>
      </div>

      <div class="p-6 relative -mt-16">
        <h2 class="text-3xl font-extrabold mb-2" x-text="selectedMovie?.title"></h2>
        <div class="space-y-3 mt-8">
          <a :href="selectedMovie?.watchLink" target="_blank" class="flex items-center justify-center w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-red-700 transition">
            <i class="ph-fill ph-play-circle text-2xl mr-2"></i> Watch Movie
          </a>
          <a :href="config.telegramLink" target="_blank" class="flex items-center justify-center w-full glass-card py-4 rounded-xl font-bold hover:bg-white/10 transition">
            Join Main Channel
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('cineHub', () => ({
        isLoading: true,
        config: {},
        movies: [],
        selectedMovie: null,

        async fetchData() {
          try {
            const response = await fetch('/api/data');
            const data = await response.json();
            this.config = data.config;
            this.movies = data.movies;
          } catch (error) {
            console.error("API Error:", error);
          } finally {
            this.isLoading = false;
          }
        }
      }))
    })
  </script>
</body>
</html>
