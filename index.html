<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineHub - Premium Enhanced</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: "#08080b",
            darker: "#040405",
            card: "#101014",
            primary: "#e50914",
            accent: "#0088cc",
            soft: "#9ca3af",
            gold: "#f5c542",
            brandOrange: "#ff8c00"
          },
          boxShadow: {
            glowRed: "0 0 35px rgba(229,9,20,.40)",
            glowOrange: "0 0 25px rgba(255,140,0,.40)",
            glowBlue: "0 0 35px rgba(0,136,204,.25)",
            soft: "0 10px 40px rgba(0,0,0,.35)"
          },
          animation: {
            "pulse-slow": "pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            "float-soft": "floatSoft 6s ease-in-out infinite",
            "slide-up": "slideUp .35s ease-out",
            "shimmer": "shimmer 2.5s infinite linear"
          },
          keyframes: {
            floatSoft: {
              "0%,100%": { transform: "translateY(0px)" },
              "50%": { transform: "translateY(-8px)" }
            },
            slideUp: {
              "0%": { transform: "translateY(20px)", opacity: 0 },
              "100%": { transform: "translateY(0px)", opacity: 1 }
            },
            shimmer: {
              "0%": { transform: "translateX(-150%) skewX(-20deg)" },
              "100%": { transform: "translateX(250%) skewX(-20deg)" }
            }
          }
        }
      }
    }
  </script>

  <!-- Alpine -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    [x-cloak] { display: none !important; }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(229,9,20,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(0,136,204,.10), transparent 28%),
        #040405;
    }

    .glass {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.08);
    }

    .glass-strong {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.10);
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .chip-active {
      background: linear-gradient(135deg, rgba(229,9,20,.95), rgba(255,76,76,.85));
      color: white;
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 0 25px rgba(229,9,20,.25);
    }
  </style>
</head>

<body
  class="text-white min-h-screen overflow-x-hidden selection:bg-brandOrange selection:text-white"
  x-data="cineHub()"
  x-init="fetchData()"
>
  <!-- Ambient background blobs -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-[15%] -left-[10%] w-[60vw] h-[60vw] bg-primary/10 blur-[120px] rounded-full animate-pulse-slow"></div>
    <div class="absolute top-[40%] -right-[10%] w-[55vw] h-[55vw] bg-accent/10 blur-[120px] rounded-full animate-pulse-slow"></div>
    <div class="absolute bottom-[5%] left-[25%] w-[40vw] h-[40vw] bg-white/5 blur-[120px] rounded-full"></div>
  </div>

  <main class="relative z-10 max-w-xl mx-auto px-4 sm:px-5 pt-5 pb-24" x-cloak>

    <!-- NEW HERO LAYOUT (2 Posters -> Button -> 2 Posters) -->
    <section class="mb-8">
      
      <!-- Top 2 Movies -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <!-- Loading Skeletons -->
        <template x-if="isLoading">
          <div class="aspect-[3/4] bg-white/5 rounded-[1.5rem] animate-pulse border border-white/10"></div>
        </template>
        <template x-if="isLoading">
          <div class="aspect-[3/4] bg-white/5 rounded-[1.5rem] animate-pulse border border-white/10"></div>
        </template>

        <!-- Actual Data -->
        <template x-for="movie in topFourMovies.slice(0, 2)" :key="movie.id">
          <div @click="openMovie(movie)" class="rounded-[1.5rem] overflow-hidden aspect-[3/4] bg-card border border-white/10 shadow-soft relative group cursor-pointer">
            <img :src="movie.poster || fallbackPoster" :alt="movie.title" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
              <span class="text-sm font-bold text-white drop-shadow-md line-clamp-2" x-text="movie.title"></span>
            </div>
            <!-- Quality Badge Overlay -->
            <template x-if="movie.quality">
              <span class="absolute top-2 left-2 px-2 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest bg-black/60 backdrop-blur-md border border-white/10" x-text="movie.quality"></span>
            </template>
          </div>
        </template>
      </div>

      <!-- Enhanced "Watch now" Button -->
      <div class="flex justify-center w-full mb-4">
        <button
          @click="smartRedirect()"
          class="relative overflow-hidden w-full sm:w-[90%] bg-[#0c0c10] border border-white/10 rounded-[1.8rem] p-2 flex items-center justify-between group shadow-soft hover:shadow-glowOrange transition-all duration-300 transform hover:-translate-y-1"
        >
          <!-- Shimmer Sweep Effect -->
          <div class="absolute inset-0 w-[60%] bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-[150%] skew-x-[-20deg] group-hover:animate-shimmer z-0 pointer-events-none"></div>

          <!-- Text -->
          <span class="text-2xl sm:text-3xl font-black text-white ml-6 tracking-wide z-10 drop-shadow-lg">Watch now</span>

          <!-- Animated Orange Play Button Area -->
          <div class="relative z-10 bg-brandOrange rounded-[1.2rem] w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center shadow-[0_0_20px_rgba(255,140,0,0.5)] transition-transform duration-500 group-hover:scale-105 group-hover:rotate-[10deg]">
            <i class="ph-fill ph-play text-white text-2xl sm:text-3xl ml-1 drop-shadow-md"></i>
          </div>
        </button>
      </div>

      <!-- Bottom 2 Movies -->
      <div class="grid grid-cols-2 gap-3 mb-6">
        <!-- Loading Skeletons -->
        <template x-if="isLoading">
          <div class="aspect-[3/4] bg-white/5 rounded-[1.5rem] animate-pulse border border-white/10"></div>
        </template>
        <template x-if="isLoading">
          <div class="aspect-[3/4] bg-white/5 rounded-[1.5rem] animate-pulse border border-white/10"></div>
        </template>

        <!-- Actual Data -->
        <template x-for="movie in topFourMovies.slice(2, 4)" :key="movie.id">
          <div @click="openMovie(movie)" class="rounded-[1.5rem] overflow-hidden aspect-[3/4] bg-card border border-white/10 shadow-soft relative group cursor-pointer">
            <img :src="movie.poster || fallbackPoster" :alt="movie.title" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
              <span class="text-sm font-bold text-white drop-shadow-md line-clamp-2" x-text="movie.title"></span>
            </div>
            <!-- Quality Badge Overlay -->
            <template x-if="movie.quality">
              <span class="absolute top-2 left-2 px-2 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest bg-black/60 backdrop-blur-md border border-white/10" x-text="movie.quality"></span>
            </template>
          </div>
        </template>
      </div>
    </section>

    <!-- SEARCH + FILTERS -->
    <section id="moviesSection" class="mb-5 mt-2">
      <!-- Search -->
      <div class="glass-strong rounded-[1.6rem] p-3 border border-white/10 mb-3">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl bg-white/5 flex items-center justify-center shrink-0">
            <i class="ph ph-magnifying-glass text-xl text-white/80"></i>
          </div>

          <div class="flex-1">
            <input
              x-model="searchQuery"
              type="text"
              placeholder="Search movies, genre, year, language..."
              class="w-full bg-transparent outline-none text-white placeholder:text-gray-400 text-sm sm:text-base"
            />
          </div>

          <button
            x-show="searchQuery"
            @click="searchQuery = ''"
            class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center transition"
          >
            <i class="ph ph-x text-lg"></i>
          </button>
        </div>
      </div>

      <!-- Filter chips -->
      <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
        <button
          @click="selectedGenre = 'All'"
          :class="selectedGenre === 'All' ? 'chip-active' : 'glass hover:bg-white/10'"
          class="shrink-0 px-4 py-2 rounded-xl text-sm font-bold border transition"
        >
          All
        </button>

        <template x-for="genre in genres" :key="genre">
          <button
            @click="selectedGenre = genre"
            :class="selectedGenre === genre ? 'chip-active' : 'glass hover:bg-white/10'"
            class="shrink-0 px-4 py-2 rounded-xl text-sm font-bold border transition"
            x-text="genre"
          ></button>
        </template>
      </div>
    </section>

    <!-- SECTION HEADER -->
    <section class="flex items-center justify-between mb-4">
      <div>
        <h3 class="text-xl font-black tracking-tight">Browse All</h3>
        <p class="text-sm text-gray-400">
          <span x-text="filteredMovies.length"></span> result(s)
          <template x-if="searchQuery">
            <span> for "<span x-text="searchQuery"></span>"</span>
          </template>
          <template x-if="selectedGenre !== 'All'">
            <span> in <span x-text="selectedGenre"></span></span>
          </template>
        </p>
      </div>
    </section>

    <!-- LOADING (Grid) -->
    <div x-show="isLoading" class="py-4">
      <div class="grid grid-cols-2 gap-4">
        <template x-for="i in 4" :key="i">
          <div class="animate-pulse">
            <div class="aspect-[2/3] rounded-[1.7rem] bg-white/5 border border-white/5"></div>
            <div class="h-4 bg-white/5 rounded-lg mt-3 w-3/4"></div>
            <div class="h-3 bg-white/5 rounded-lg mt-2 w-1/2"></div>
          </div>
        </template>
      </div>
    </div>

    <!-- MOVIES GRID -->
    <section x-show="!isLoading">
      <div class="grid grid-cols-2 gap-4 sm:gap-5">
        <template x-for="movie in filteredMovies" :key="movie.id">
          <article
            @click="openMovie(movie)"
            class="group relative movie-card rounded-[1.8rem] overflow-hidden cursor-pointer aspect-[2/3] bg-card border border-white/10 shadow-soft hover:border-white/20 transition-all duration-500 animate-slide-up"
          >
            <!-- Poster -->
            <div class="absolute inset-0">
              <img
                :src="movie.poster || fallbackPoster"
                :alt="movie.title"
                class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
              />
            </div>

            <!-- Top badges -->
            <div class="absolute top-3 left-3 z-10 flex flex-wrap gap-2 max-w-[80%]">
              <template x-if="movie.badge">
                <span class="px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest bg-brandOrange/95 text-white shadow-lg" x-text="movie.badge"></span>
              </template>

              <template x-if="movie.quality">
                <span class="px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest bg-black/50 backdrop-blur-md border border-white/10" x-text="movie.quality"></span>
              </template>
            </div>

            <!-- Hover play -->
            <div class="absolute inset-0 z-10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
              <div class="w-16 h-16 rounded-[1.2rem] bg-brandOrange/90 backdrop-blur-md flex items-center justify-center shadow-glowOrange">
                <i class="ph-fill ph-play text-white text-2xl ml-1"></i>
              </div>
            </div>

            <!-- Bottom info -->
            <div class="absolute bottom-0 left-0 right-0 z-10 p-4">
              <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-gray-300 mb-2 flex-wrap">
                <template x-if="movie.genre">
                  <span class="text-brandOrange" x-text="movie.genre"></span>
                </template>
                <template x-if="movie.year">
                  <span>• <span x-text="movie.year"></span></span>
                </template>
              </div>

              <h4 class="text-white font-black text-base leading-tight drop-shadow-lg line-clamp-2" x-text="movie.title"></h4>

              <div class="flex items-center justify-between mt-2">
                <template x-if="movie.language">
                  <p class="text-xs text-gray-300 truncate" x-text="movie.language"></p>
                </template>
              </div>
            </div>
          </article>
        </template>
      </div>

      <!-- Empty state -->
      <div
        x-show="!filteredMovies.length && !isLoading"
        class="mt-8 glass-strong rounded-[2rem] p-8 text-center border border-white/10"
      >
        <div class="w-16 h-16 mx-auto rounded-2xl bg-white/5 flex items-center justify-center mb-4">
          <i class="ph ph-film-strip text-3xl text-brandOrange"></i>
        </div>
        <h4 class="text-xl font-black mb-2">No movie found</h4>
        <p class="text-gray-400 text-sm mb-5">Try another title, genre, year, or keyword.</p>
        <button
          @click="clearFilters()"
          class="bg-white text-black px-5 py-3 rounded-2xl font-bold hover:scale-[1.02] transition"
        >
          Clear Search
        </button>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="pt-10 text-center text-sm text-gray-500">
      <p class="font-semibold" x-text="config.footerText || 'One link. Unlimited entertainment.'"></p>
    </footer>
  </main>

  <!-- MOVIE MODAL -->
  <div
    x-cloak
    x-show="selectedMovie"
    class="fixed inset-0 z-50 bg-black/85 backdrop-blur-xl flex items-end sm:items-center justify-center p-3 sm:p-5"
  >
    <div
      @click.away="selectedMovie = null"
      class="w-full max-w-md bg-[#0c0c12] border border-white/10 rounded-[2rem] overflow-hidden shadow-2xl"
      x-show="selectedMovie"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-10 scale-95"
      x-transition:enter-end="opacity-100 translate-y-0 scale-100"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 translate-y-0 scale-100"
      x-transition:leave-end="opacity-0 translate-y-6 scale-95"
    >
      <!-- Poster -->
      <div class="relative h-72">
        <img
          :src="selectedMovie?.poster || fallbackPoster"
          :alt="selectedMovie?.title || 'Movie'"
          class="w-full h-full object-cover"
        />
        <div class="absolute inset-0 bg-gradient-to-t from-[#0c0c12] via-[#0c0c12]/40 to-transparent"></div>

        <button
          @click="selectedMovie = null"
          class="absolute top-4 right-4 w-11 h-11 rounded-full glass flex items-center justify-center hover:bg-white hover:text-black transition"
        >
          <i class="ph ph-x text-lg"></i>
        </button>
      </div>

      <!-- Content -->
      <div class="p-5 -mt-12 relative">
        <!-- Meta -->
        <div class="flex flex-wrap gap-2 mb-3">
          <template x-if="selectedMovie?.genre">
            <span class="glass px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="selectedMovie.genre"></span>
          </template>

          <template x-if="selectedMovie?.year">
            <span class="glass px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="selectedMovie.year"></span>
          </template>

          <template x-if="selectedMovie?.language">
            <span class="glass px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="selectedMovie.language"></span>
          </template>

          <template x-if="selectedMovie?.quality">
            <span class="glass px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="selectedMovie.quality"></span>
          </template>
        </div>

        <!-- Title -->
        <h3 class="text-3xl font-black tracking-tight leading-tight mb-3" x-text="selectedMovie?.title"></h3>

        <!-- Description -->
        <template x-if="selectedMovie?.description">
          <p class="text-sm text-gray-300 leading-relaxed mb-5 line-clamp-3" x-text="selectedMovie.description"></p>
        </template>

        <!-- Buttons -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <button
            @click="smartRedirect(selectedMovie)"
            class="flex items-center justify-center gap-2 bg-brandOrange text-white py-4 rounded-[1.2rem] font-black hover:scale-[1.02] transition shadow-glowOrange"
          >
            <i class="ph-fill ph-play-circle text-2xl"></i>
            Watch Now
          </button>

          <a
            :href="selectedMovie?.secondaryLink || config.telegramLink"
            target="_blank"
            class="flex items-center justify-center gap-2 glass-strong py-4 rounded-[1.2rem] font-black hover:bg-white/10 transition"
          >
            <i class="ph-fill ph-telegram-logo text-2xl text-accent"></i>
            Join Channel
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("alpine:init", () => {
      Alpine.data("cineHub", () => ({
        isLoading: true,

        config: {
          // Default Telegram link until API overrides it
          telegramLink: "https://t.me/moviez_hub143",
          instagramLink: "",
          footerText: "One link. Unlimited entertainment."
        },

        movies: [],
        selectedMovie: null,

        searchQuery: "",
        selectedGenre: "All",

        fallbackPoster: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=800&auto=format&fit=crop",

        async fetchData() {
          try {
            const res = await fetch("/api/data");
            const data = await res.json();

            this.config = {
              ...this.config,
              ...(data.config || {})
            };

            this.movies = Array.isArray(data.movies) ? data.movies : [];
          } catch (err) {
            console.error("API Error:", err);
          } finally {
            this.isLoading = false;
          }
        },

        // Get Top 4 Movies for the Hero Section
        get topFourMovies() {
          return this.movies.slice(0, 4);
        },

        get genres() {
          const allGenres = this.movies
            .map(m => (m.genre || "").trim())
            .filter(Boolean);

          return [...new Set(allGenres)];
        },

        get filteredMovies() {
          // Remove the first 4 if you don't want them duplicated below, 
          // but usually keeping them in the main grid is fine for filtering.
          let list = [...this.movies];

          if (this.selectedGenre !== "All") {
            list = list.filter(movie => (movie.genre || "").toLowerCase() === this.selectedGenre.toLowerCase());
          }

          const q = this.searchQuery.trim().toLowerCase();
          if (q) {
            list = list.filter(movie => {
              return [
                movie.title,
                movie.genre,
                movie.badge,
                movie.language,
                movie.year,
                movie.quality,
                movie.description
              ]
                .filter(Boolean)
                .join(" ")
                .toLowerCase()
                .includes(q);
            });
          }

          return list;
        },

        clearFilters() {
          this.searchQuery = "";
          this.selectedGenre = "All";
        },

        openMovie(movie) {
          this.selectedMovie = movie;
        },

        smartRedirect(movie = null) {
          const telegramUrl = this.config.telegramLink;
          const fallbackUrl = movie?.watchLink || telegramUrl;

          if (!fallbackUrl) return;

          if (movie?.watchLink && !telegramUrl) {
            window.location.href = movie.watchLink;
            return;
          }

          if (!telegramUrl) {
            window.location.href = fallbackUrl;
            return;
          }

          let deepLink = telegramUrl;

          if (telegramUrl.includes("t.me/")) {
            const path = telegramUrl.split("t.me/")[1];

            if (path.startsWith("+") || path.startsWith("joinchat/")) {
              const inviteCode = path.replace("+", "").replace("joinchat/", "");
              deepLink = `tg://join?invite=${inviteCode}`;
            } else {
              const username = path.split("?")[0].split("/")[0];
              deepLink = `tg://resolve?domain=${username}`;
            }
          }

          let appOpened = false;

          const markOpened = () => {
            appOpened = true;
          };

          const visibilityHandler = () => {
            if (document.hidden) appOpened = true;
          };

          window.addEventListener("blur", markOpened);
          document.addEventListener("visibilitychange", visibilityHandler);

          window.location.href = deepLink;

          setTimeout(() => {
            window.removeEventListener("blur", markOpened);
            document.removeEventListener("visibilitychange", visibilityHandler);

            if (!appOpened && !document.hidden) {
              window.location.href = fallbackUrl;
            }
          }, 1800);
        }
      }));
    });
  </script>
</body>
</html>
